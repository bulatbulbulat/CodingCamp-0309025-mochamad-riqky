<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="dark-mode-toggle" style="margin-bottom: 10px;">Toggle Dark Mode</button>

    <header class="card greeting-card">
        <h1 id="time">00:00:00</h1>
        <p id="date">Tuesday, January 27, 2026</p>
        <h2><span id="greeting-text">Good Morning</span>, <span id="user-name" contenteditable="true">[Your Name]</span></h2>
        <small>(Click name to edit)</small>
    </header>

    <div class="container">
        <header class="card greeting-card">
            <h1 id="time">00:00:00</h1> 
            <p id="date">Tuesday, January 27, 2026</p> 
            <h2 id="greeting-text">Good Morning</h2> 
        </header>

        <main class="dashboard-grid">
            <section class="card timer-card">
                <h3>Focus Timer</h3> 
                <div class="timer-display" id="timer">25:00</div> 
                <div class="timer-controls">
                    <button id="start-btn">Start</button> 
                    <button id="stop-btn">Stop</button> 
                    <button id="reset-btn">Reset</button> 
                </div>
            </section>

            <section class="card todo-card">
                <h3>Tasks</h3> 
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="Add a new task..."> 
                    <button id="add-todo-btn">Add</button> 
                </div>
                <ul id="todo-list">
                    </ul>
            </section>

            <section class="card links-card">
                <h3>Quick Links</h3> 
                <div class="input-group">
                    <input type="text" id="link-name" placeholder="Link name"> 
                    <input type="text" id="link-url" placeholder="URL"> 
                    <button id="add-link-btn">Add Link</button> 
                </div>
                <div id="links-container" class="links-grid">
                    </div>
            </section>
        </main>
    </div>

    

    <script src="script.js"></script> 
</body>
</html>
